<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Web App</title>
    <style>
        /* Remove all default margins and scrollbars from the browser window */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Force the iframe to occupy 100% of the viewport seamlessly */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Replace the URL below with your actual Google Apps Script Web App URL -->
    <iframe src="https://script.google.com/macros/s/AKfycbylE5OeiYAwe7V9Su_JiEHriC5QYDmVLO3b5qz_suqhohR1_AzRUW1N127I84vBOBphFg/exec">
        <p>Your browser does not support iframes. Please visit the app directly.</p>
    </iframe>

</body>
</html>

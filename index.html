<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ====== THEME: Neon Pitch (refined, default) ====== */
    :root{
      --page-bg: radial-gradient(900px 420px at 50% -180px, rgba(120,220,150,.10), transparent 65%), #0c1611;
      --bg:#0c1611; --card:#14241b; --card2:#1b2d23;
      --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
      --txt:#e9f7ee; --mut:#8ba89a; --mut2:#5f7669;
      --lime:#9fe85f; --accent-ink:#0a160e;
      --accent-soft:rgba(159,232,95,.13); --accent-bd:rgba(159,232,95,.32); --accent-glow:rgba(159,232,95,.18); --fill:rgba(159,232,95,.20);
      --cyan:#52c7e6; --line-soft:rgba(82,199,230,.14); --line-bd:rgba(82,199,230,.42);
      --win:#84e07a; --win-bd:rgba(132,224,122,.4); --lose:#ff6b78; --gold:#f2c43d;
      --win-soft:rgba(132,224,122,.16); --win-tint:rgba(132,224,122,.07); --win-flash:rgba(132,224,122,.34);
      --lose-soft:rgba(255,107,120,.16); --lose-tint:rgba(255,107,120,.06); --lose-flash:rgba(255,107,120,.34);
      --inputbg:#0c1812; --navbg:rgba(13,28,20,.94);
      --headcard:linear-gradient(135deg,#17361f,#102619);
      --topbar-bg:linear-gradient(135deg,#163827,#0f261b);
      --topbar-txt:#eafdf2; --topbar-mut:#9fc2b0; --topbar-accent:#9fe85f;
      --topbar-line:rgba(255,255,255,.14); --topbar-btn:rgba(255,255,255,.07); --topbar-chip:rgba(255,255,255,.08);
      --shadow:0 10px 26px rgba(0,0,0,.32);
    }
    /* ====== THEME: Candy Pop (light) ====== */
    html[data-theme="candy"]{
      --page-bg: radial-gradient(900px 460px at 50% -160px, #ece0ff, transparent 62%), #ddd0ec;
      --bg:#ddd0ec; --card:#ffffff; --card2:#f4eefc;
      --line:rgba(90,50,150,.10); --line2:rgba(90,50,150,.16);
      --txt:#281d3d; --mut:#7d7596; --mut2:#a79fbd;
      --lime:#7c3aed; --accent-ink:#ffffff;
      --accent-soft:#f1e9ff; --accent-bd:rgba(124,58,237,.28); --accent-glow:rgba(124,58,237,.2); --fill:rgba(124,58,237,.18);
      --cyan:#0e95b0; --line-soft:rgba(14,149,176,.12); --line-bd:rgba(14,149,176,.4);
      --win:#16a34a; --win-bd:rgba(22,163,74,.4); --lose:#e23b5a; --gold:#e8920c;
      --win-soft:rgba(22,163,74,.14); --win-tint:rgba(22,163,74,.07); --win-flash:rgba(22,163,74,.26);
      --lose-soft:rgba(226,59,90,.13); --lose-tint:rgba(226,59,90,.06); --lose-flash:rgba(226,59,90,.26);
      --inputbg:#f5f0fc; --navbg:rgba(255,255,255,.92);
      --headcard:linear-gradient(135deg,#f3e9ff,#fbf7ff);
      --topbar-bg:linear-gradient(135deg,#7c3aed,#9b5cf6);
      --topbar-txt:#ffffff; --topbar-mut:rgba(255,255,255,.82); --topbar-accent:#ffffff;
      --topbar-line:rgba(255,255,255,.32); --topbar-btn:rgba(255,255,255,.18); --topbar-chip:rgba(255,255,255,.16);
      --shadow:0 10px 26px rgba(110,70,170,.14);
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html{ margin:0; background:var(--page-bg); }
    body{
      margin:0; background:var(--page-bg);
      color:var(--txt); font-family:'Outfit',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      font-size:15px; min-height:100vh; -webkit-font-smoothing:antialiased;
    }
    .wrap{ max-width:540px; margin:0 auto; padding:0 14px 120px; }

    /* ---------- toast ---------- */
    #msg{ position:fixed; left:50%; top:14px; transform:translate(-50%,-140%); z-index:200;
      max-width:480px; width:calc(100% - 28px); padding:12px 16px; border-radius:14px; font-size:13.5px; font-weight:600;
      transition:transform .35s cubic-bezier(.2,.9,.3,1.2); box-shadow:0 14px 40px rgba(0,0,0,.3); }
    #msg.show{ transform:translate(-50%,0); }
    #msg.err{ background:#2a1115; color:#ffc2c8; border:1px solid #5c2b32; }
    #msg.ok{ background:#10301f; color:#cdffd9; border:1px solid rgba(159,232,95,.35); }

    /* ---------- buttons ---------- */
    button{ font-family:inherit; cursor:pointer; border:0; }
    .btn{ background:var(--lime); color:var(--accent-ink); border-radius:13px; padding:13px 18px; font-weight:800; font-size:15px;
      box-shadow:0 6px 16px var(--accent-glow); transition:transform .12s, box-shadow .2s, background-color .25s; }
    .btn:active{ transform:translateY(1px) scale(.99); }
    .btn.block{ width:100%; }
    .btn.ghost{ background:transparent; color:var(--txt); border:1px solid var(--line2); box-shadow:none; font-weight:700; }
    .btn.sm{ padding:8px 13px; font-size:13px; border-radius:10px; }
    .btn:disabled{ opacity:.4; cursor:not-allowed; }

    /* ---------- cards ---------- */
    .card{ background:var(--card); border:1px solid var(--line); border-radius:20px; padding:16px; margin-bottom:13px;
      box-shadow:var(--shadow); transition:background-color .25s, border-color .25s; }
    .headcard{ background:var(--headcard); }
    .row{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .muted{ color:var(--mut); font-size:13px; }
    .mut2{ color:var(--mut2); }
    h1{ font-size:22px; margin:0; font-weight:900; letter-spacing:.3px; }

    label{ display:block; font-size:12px; color:var(--mut); margin:13px 0 5px; font-weight:600; }
    input,select{ background:var(--inputbg); border:1px solid var(--line2); color:var(--txt); border-radius:12px; padding:12px 13px;
      font-size:15px; width:100%; font-family:inherit; outline:none; transition:border-color .15s, box-shadow .15s; }
    input:focus,select:focus{ border-color:var(--lime); box-shadow:0 0 0 3px var(--accent-glow); }
    input[type=checkbox]{ width:auto; accent-color:var(--lime); }

    .pts{ font-weight:800; color:var(--lime); }
    .chip{ display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; font-size:12.5px; font-weight:700; white-space:nowrap; }
    .chip.lime{ background:var(--accent-soft); color:var(--lime); border:1px solid var(--accent-bd); }
    .chip.gold{ background:rgba(242,196,61,.14); color:var(--gold); border:1px solid rgba(242,196,61,.3); }
    .chip.glass{ color:var(--mut); border:1px solid var(--line2); }

    /* ---------- topbar ---------- */
    .topbar{ position:sticky; top:0; z-index:50; margin:0 -14px 14px; padding:14px 16px 15px;
      background:var(--topbar-bg); color:var(--topbar-txt); border-bottom:0; border-radius:0 0 22px 22px;
      box-shadow:0 8px 24px rgba(0,0,0,.22); transition:background .3s; }
    .brand{ font-weight:900; font-size:19px; letter-spacing:.5px; line-height:1; display:flex; align-items:center; gap:8px; white-space:nowrap; color:var(--topbar-txt); }
    .brand .dot{ margin-left:2px; color:var(--topbar-accent); }
    .ptspill{ display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
    .ptspill .n{ font-weight:900; font-size:20px; color:var(--topbar-accent); line-height:1; }
    .ptspill .l{ font-size:10.5px; color:var(--topbar-mut); text-transform:uppercase; letter-spacing:1px; }
    .badges{ display:flex; gap:8px; margin-top:13px; flex-wrap:wrap; }
    .iconbtn{ background:var(--topbar-btn); border:1px solid var(--topbar-line); color:var(--topbar-txt); width:34px; height:34px;
      border-radius:10px; display:inline-flex; align-items:center; justify-content:center; font-size:15px; }
    /* topbar chips read on the colored header in both themes */
    .topbar .chip{ color:var(--topbar-txt); border-color:var(--topbar-line); background:var(--topbar-chip); }
    .topbar .chip b{ color:var(--topbar-txt); }
    .poolsel{ display:inline-flex; align-items:center; gap:8px; padding:4px 5px 4px 12px; border-radius:999px;
      background:var(--topbar-chip); border:1px solid var(--topbar-line); color:var(--topbar-txt); cursor:pointer;
      max-width:60vw; font-size:12.5px; transition:transform .12s, background-color .15s; }
    .poolsel:active{ transform:scale(.97); }
    .poolsel .ps-k{ font-size:9px; font-weight:800; letter-spacing:.9px; text-transform:uppercase; color:var(--topbar-mut); flex:none; }
    .poolsel .ps-n{ font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .poolsel .ps-x{ width:19px; height:19px; border-radius:50%; background:var(--topbar-btn); border:1px solid var(--topbar-line);
      display:flex; align-items:center; justify-content:center; font-size:9px; flex:none; }

    /* ---------- bottom nav ---------- */
    .nav{ position:fixed; left:50%; transform:translateX(-50%); bottom:14px; z-index:60;
      width:calc(100% - 28px); max-width:512px; display:flex; gap:4px; padding:7px;
      background:var(--navbg); backdrop-filter:blur(14px); border:1px solid var(--line2);
      border-radius:20px; box-shadow:0 14px 34px rgba(0,0,0,.28); transition:background .3s; }
    .navbtn{ flex:1; background:transparent; color:var(--mut); border-radius:14px; padding:8px 4px 6px;
      display:flex; flex-direction:column; align-items:center; gap:3px; font-size:11px; font-weight:700; transition:.15s; }
    .navbtn .ic{ font-size:18px; line-height:1; }
    .navbtn.active{ background:var(--lime); color:var(--accent-ink); }
    .navbtn:disabled{ opacity:.35; }

    /* ---------- tabs (segmented) ---------- */
    .seg{ display:flex; gap:6px; background:var(--inputbg); border:1px solid var(--line); border-radius:14px; padding:5px; }
    .seg button{ flex:1; background:transparent; color:var(--mut); border-radius:10px; padding:10px; font-weight:700; font-size:14px; transition:.15s; }
    .seg button.on{ background:var(--lime); color:var(--accent-ink); }

    /* ---------- theme chooser (auth) ---------- */
    .themebtn{ background:var(--card); color:var(--txt); border:1px solid var(--line2); border-radius:12px;
      padding:9px 14px; font-weight:700; font-size:13.5px; }
    .themebtn.on{ border-color:var(--lime); box-shadow:0 0 0 2px var(--accent-glow); color:var(--lime); }

    /* ---------- match / markets ---------- */
    .teams{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:15.5px; flex-wrap:wrap; }
    .vs{ color:var(--mut2); font-weight:700; font-size:13px; }
    .flag{ width:26px; height:19px; border-radius:4px; object-fit:cover; vertical-align:middle; box-shadow:0 1px 3px rgba(0,0,0,.25); }
    .ab{ display:inline-flex; min-width:26px; height:19px; align-items:center; justify-content:center; background:var(--card2);
      border:1px solid var(--line); border-radius:4px; font-size:10px; font-weight:800; padding:0 4px; color:var(--mut); }
    .kick{ display:inline-flex; align-items:center; gap:5px; color:var(--cyan); font-weight:600; font-size:12px;
      border:1px solid var(--line-bd); padding:4px 10px; border-radius:999px; white-space:nowrap; }
    .closed{ color:var(--lose); font-size:11.5px; font-weight:800; border:1px solid rgba(255,107,120,.35);
      padding:4px 10px; border-radius:999px; }

    .mkt{ display:flex; align-items:center; gap:9px; margin:15px 0 9px; padding-top:14px; border-top:1px solid var(--line); font-size:11px; font-weight:800;
      color:var(--mut2); text-transform:uppercase; letter-spacing:1.2px; }
    .card.mc-closed{ opacity:.6; }
    .card.mc-closed .teams{ filter:grayscale(.3); }
    .mc-body.collapsed{ display:none; }
    .card.open .mc-head .hchev{ transform:rotate(180deg); }
    .ln{ background:var(--line-soft); color:var(--cyan); border:1px solid var(--line-bd);
      border-radius:9px; padding:3px 12px; font-size:15px; font-weight:900; letter-spacing:.2px; text-transform:none; }
    .odds-grid{ display:flex; gap:8px; }
    .odd{ position:relative; flex:1; background:var(--card2); color:var(--txt); border:1px solid var(--line2); border-radius:14px;
      padding:11px 6px 12px; display:flex; flex-direction:column; gap:5px; align-items:center; cursor:pointer; overflow:hidden;
      transition:transform .12s cubic-bezier(.2,.9,.3,1.2), background-color .18s, border-color .18s, box-shadow .2s; }
    .odd .lbl{ font-size:11.5px; font-weight:700; color:var(--mut); letter-spacing:.2px; white-space:nowrap; }
    .odd .val{ font-size:21px; font-weight:900; line-height:1; display:flex; align-items:center; gap:5px; }
    .oar{ display:inline-flex; align-items:center; font-size:10px; font-weight:800; padding:2px 5px; border-radius:999px; line-height:1; }
    .oar.up{ color:var(--win); background:var(--win-soft); }
    .oar.dn{ color:var(--lose); background:var(--lose-soft); }
    @keyframes flashUp{ 0%{ background:var(--win-flash);} 100%{ background:var(--card2);} }
    @keyframes flashDn{ 0%{ background:var(--lose-flash);} 100%{ background:var(--card2);} }
    .odd.flash-up{ animation:flashUp 1.2s ease-out; }
    .odd.flash-dn{ animation:flashDn 1.2s ease-out; }

    /* ---------- admin: kèo tuỳ chỉnh theo trận ---------- */
    .mkt-tools{ margin-left:auto; display:inline-flex; gap:6px; text-transform:none; }
    .mkt-tool{ background:var(--card2); color:var(--mut); border:1px solid var(--line2); border-radius:8px;
      width:26px; height:24px; display:inline-flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer; transition:.15s; padding:0; }
    .mkt-tool:hover{ color:var(--lose); border-color:rgba(255,107,120,.4); }
    .mkt-custom{ color:var(--lime); }
    .addmkt{ background:transparent; color:var(--lime); border:1px dashed var(--accent-bd); border-radius:11px;
      padding:9px; width:100%; margin-top:13px; font-weight:800; font-size:12.5px; cursor:pointer; letter-spacing:.3px; }
    .addmkt:hover{ background:var(--accent-soft); }
    .mfield{ display:block; margin-top:12px; }
    .mfield > span{ display:block; font-size:11px; font-weight:800; color:var(--mut2); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    .minput{ width:100%; background:var(--inputbg); color:var(--txt); border:1px solid var(--line2); border-radius:11px; padding:11px 12px; font-size:14px; font-weight:600; box-sizing:border-box; }
    .minput:focus{ outline:none; border-color:var(--lime); box-shadow:0 0 0 3px var(--accent-glow); }
    .ocrow{ display:flex; gap:8px; align-items:center; margin-top:8px; }
    .ocrow .oc-lbl{ flex:1; }
    .ocrow .oc-odd{ width:88px; flex:none; }
    .ocrow .oc-del{ flex:none; background:var(--card2); color:var(--mut); border:1px solid var(--line2); border-radius:9px; width:36px; height:40px; font-size:14px; cursor:pointer; }
    .ocrow .oc-del:hover{ color:var(--lose); border-color:rgba(255,107,120,.4); }
    .oc-add{ background:transparent; color:var(--cyan); border:1px dashed var(--line-bd); border-radius:9px; padding:8px; width:100%; margin-top:9px; font-weight:700; font-size:12px; cursor:pointer; }

    /* ---------- kèo tự ra: vòng đời + chấm kết quả ---------- */
    .cm-head{ flex-wrap:wrap; row-gap:6px; }
    .cm-tag{ display:inline-flex; align-items:center; gap:4px; background:var(--accent-soft); color:var(--lime); border:1px solid var(--accent-bd);
      border-radius:7px; padding:2px 8px; font-size:10px; font-weight:800; letter-spacing:.4px; text-transform:none; flex:none; }
    .cm-name{ font-weight:800; font-size:13px; color:var(--txt); text-transform:none; letter-spacing:0; min-width:0; }
    .cm-st{ display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding:2px 9px; font-size:10.5px; font-weight:800; text-transform:none; letter-spacing:.2px; flex:none; }
    .cm-st.cm-open{ color:var(--cyan); background:var(--line-soft); border:1px solid var(--line-bd); }
    .cm-st.cm-wait{ color:var(--gold); background:rgba(242,196,61,.14); border:1px solid rgba(242,196,61,.42); animation:cmPulse 1.8s ease-in-out infinite; }
    .cm-st.cm-done{ color:var(--win); background:var(--win-soft); border:1px solid var(--win-bd); }
    .cm-st.cm-void{ color:var(--mut); background:var(--inputbg); border:1px solid var(--line2); }
    @keyframes cmPulse{ 0%,100%{ opacity:1; } 50%{ opacity:.5; } }
    .settle-cta{ width:100%; margin-top:11px; background:var(--gold); color:#241a00; border:0; border-radius:13px; padding:12px;
      font-weight:800; font-size:14px; cursor:pointer; box-shadow:0 6px 16px rgba(242,196,61,.28); transition:transform .12s; }
    .settle-cta:active{ transform:translateY(1px) scale(.99); }
    .cm-note{ margin-top:10px; color:var(--gold); font-size:12.5px; font-weight:700; background:rgba(242,196,61,.10);
      border:1px dashed rgba(242,196,61,.35); border-radius:11px; padding:9px 12px; }
    .cm-result{ margin-top:10px; color:var(--win); font-size:13px; font-weight:700; background:var(--win-tint);
      border:1px solid var(--win-bd); border-radius:11px; padding:9px 12px; }
    .cm-result b{ color:var(--win); }
    .cm-result.void{ color:var(--mut); background:var(--inputbg); border-color:var(--line2); }
    .odd.res{ cursor:default; }
    .odd.res .restag{ font-size:10px; font-weight:800; padding:1px 7px; border-radius:999px; margin-top:1px; }
    .odd.res.win{ background:var(--win-soft); border-color:var(--win-bd); box-shadow:0 0 0 1px var(--win-bd) inset; }
    .odd.res.win .val{ color:var(--win); }
    .odd.res.win .restag{ color:var(--win); background:rgba(132,224,122,.22); }
    .odd.res.lose{ opacity:.48; }
    .odd.res.lose .restag{ color:var(--lose); background:var(--lose-soft); }
    .odd.res.voidr{ opacity:.72; }
    .odd.res.voidr .restag{ color:var(--mut); background:var(--inputbg); border:1px solid var(--line2); }
    .pendchip{ display:inline-flex; align-items:center; gap:4px; color:var(--gold); background:rgba(242,196,61,.14);
      border:1px solid rgba(242,196,61,.42); border-radius:999px; padding:3px 9px; font-size:10.5px; font-weight:800; white-space:nowrap; }
    .pendbanner{ background:rgba(242,196,61,.12); border:1px solid rgba(242,196,61,.4); color:var(--gold);
      border-radius:14px; padding:11px 14px; font-size:13px; font-weight:600; line-height:1.5; margin-bottom:13px; }
    .pendbanner b{ color:var(--gold); font-weight:800; }
    .closed.live{ color:var(--lose); border-color:rgba(255,107,120,.5); animation:cmPulse 1.6s ease-in-out infinite; }
    /* modal chấm kèo */
    .settle-opt{ display:flex; justify-content:space-between; align-items:center; gap:10px; width:100%; text-align:left;
      background:var(--card2); color:var(--txt); border:1px solid var(--line2); border-radius:13px; padding:13px 15px; font-size:15px; font-weight:700; cursor:pointer; transition:.14s; }
    .settle-opt:hover{ border-color:var(--win-bd); background:var(--win-tint); }
    .settle-opt .so-odd{ color:var(--mut); font-size:12.5px; font-weight:700; flex:none; }
    .settle-opt.cur{ border-color:var(--win-bd); box-shadow:0 0 0 2px var(--win-soft); }
    .settle-void{ width:100%; margin-top:14px; background:transparent; color:var(--mut); border:1px dashed var(--line2);
      border-radius:13px; padding:12px; font-weight:700; font-size:13.5px; cursor:pointer; transition:.14s; }
    .settle-void:hover{ color:var(--txt); }
    .settle-void.cur{ color:var(--txt); border-style:solid; }
    /* hàng đợi chấm kèo ở tab Kết quả */
    .sq-card{ border-color:rgba(242,196,61,.4); }
    .sq-head{ display:flex; align-items:center; gap:9px; font-weight:900; font-size:16px; color:var(--txt); margin-bottom:4px; }
    .sq-count{ background:var(--gold); color:#241a00; border-radius:999px; min-width:22px; height:22px; padding:0 7px; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; }
    .sq-sub{ font-size:11px; font-weight:800; color:var(--mut2); text-transform:uppercase; letter-spacing:1px; margin:15px 0 6px; }
    .sq-row{ display:flex; align-items:center; gap:10px; padding:11px 0; border-top:1px solid var(--line); }
    .sq-row.first{ border-top:0; }
    .sq-info{ min-width:0; flex:1; }
    .sq-name{ font-weight:800; font-size:14px; color:var(--txt); }
    .sq-match{ font-size:12px; color:var(--mut); margin-top:2px; }
    .sq-row.done .sq-name{ font-weight:700; }
    .sq-btn{ flex:none; background:var(--gold); color:#241a00; border:0; border-radius:11px; padding:9px 16px; font-weight:800; font-size:13.5px; cursor:pointer; }
    .sq-btn.ghost{ background:transparent; color:var(--mut); border:1px solid var(--line2); font-weight:700; }
    .sq-actions{ display:flex; gap:6px; flex:none; }
    .sq-btn.lock{ background:var(--win); color:#06210f; }
    .sq-item{ border-top:1px solid var(--line); }
    .sq-item .sq-row{ border-top:0; }
    .sq-res{ font-weight:800; }

<div class="wrap">

  <div id="auth">

        <button id="ta-login" class="on" onclick="authTab('login')">Đăng nhập</button>
        <button id="ta-reg" onclick="authTab('reg')">Đăng ký</button>
      </div>

<script>

// Thư viện kèo mở rộng — admin bật/tắt theo TỪNG SẢNH ở trang Quản lý sảnh; khi bật, áp dụng cho mọi trận trong sảnh đó.

function teamFlag(name){

// Thanh loading toàn cục: mọi action (sheet hay API) đều qua srun -> tự bật/tắt khi có request bay.
var NET=0;
function netStart(){ if(NET++===0){ var b=el('netbar'); if(b) b.classList.add('on'); } }
function netEnd(){ if(--NET<=0){ NET=0; var b=el('netbar'); if(b) b.classList.remove('on'); } }
// Cloudflare Worker API base. First-party fetch, so Safari keeps the session.
var WORKER_URL = 'https://the-prophet.lishace.workers.dev';
// Single server-call funnel: POST {fn,args} to the Worker. text/plain body = a "simple"
// CORS request -> no preflight; the Worker still parses it as JSON.
function srun(fn){
  var a=[].slice.call(arguments,1); netStart();
  return fetch(WORKER_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({fn:fn, args:a}) })
    .then(function(r){ return r.json(); })
    .then(function(j){ netEnd(); if(j && j.ok) return j.data; throw new Error((j && j.error) || 'Lỗi máy chủ'); },
          function(e){ netEnd(); throw e; });
}
// Khoá nút khi request đang bay -> chống double-submit (vd tạo trùng sảnh). unbusy khôi phục nhãn.
function busy(id, txt){ var b=el(id); if(b){ if(b._t==null) b._t=b.innerHTML; b.disabled=true; b.innerHTML=txt; } return b; }
function unbusy(b){ if(b){ b.disabled=false; if(b._t!=null){ b.innerHTML=b._t; b._t=null; } } }
function el(id){ return document.getElementById(id); }

// ===== Stale-while-revalidate cache (localStorage) =====
// Paint last-known data instantly, then refetch in background and repaint+persist. Cache is ONLY a
// first-paint shortcut — every open still hits the server unless data was written <SWR_TTL ago
// (dedupes getPoolView+show and rapid tab flips). Never shows data older than the next refetch.
var SWR_TTL=8000;
function lsKey(kind){ return 'pv_'+kind+'_'+CURPOOL; }
function lsGet(kind){ try{ return JSON.parse(localStorage.getItem(lsKey(kind))||'null'); }catch(e){ return null; } }
function lsSet(kind,val){ try{ localStorage.setItem(lsKey(kind), JSON.stringify({t:Date.now(),v:val})); }catch(e){} }
function swr(kind, fetchFn, apply, skel, force){
  if(!CURPOOL) return;
  var rec=force?null:lsGet(kind);
  if(rec && rec.v!=null){ apply(rec.v); if(Date.now()-rec.t < SWR_TTL) return; } // fresh -> skip refetch
  else if(skel) skel();
  fetchFn().then(function(d){ lsSet(kind,d); apply(d); }).catch(function(e){ if(!rec) msg(e.message||e); });
}

function msg(text, ok){ var m=el('msg'); m.textContent=text; m.className='msg '+(ok?'ok':'err')+' show'; clearTimeout(msg._t); msg._t=setTimeout(function(){m.classList.remove('show')}, ok?3800:5500); }
function setPts(p){ CURPOOLPTS=p; }

// ---- Auth UI ----
function authTab(t){
  el('form-login').classList.toggle('hidden', t!=='login');
  el('form-reg').classList.toggle('hidden', t!=='reg');
  el('ta-login').className=(t==='login')?'on':'';
  el('ta-reg').className=(t==='reg')?'on':'';
}
function doRegister(){
  srun('register', el('re-user').value, el('re-pass').value, el('re-nick').value)
    .then(onAuthed).catch(function(e){ msg(e.message||e); });
}
function doLogin(){
  srun('login', el('li-user').value, el('li-pass').value)
    .then(onAuthed).catch(function(e){ msg(e.message||e); });
}
function onAuthed(u){
  TOKEN=u.token; ME=u; el('me').textContent=u.nickname;
  try{ localStorage.setItem('tok', u.token); }catch(e){}
  el('auth').classList.add('hidden'); el('app').classList.remove('hidden');
  if(u.isAdmin && !el('t-admin')){
    var b=document.createElement('button'); b.id='t-admin'; b.className='navbtn'; b.innerHTML='<span class="ic">⚙️</span>Admin';
    b.onclick=function(){ show('admin'); }; el('maintabs').appendChild(b);
  }
  show('pools');
}
function logout(){ try{ localStorage.removeItem('tok'); }catch(e){}
  if(POLL){ clearInterval(POLL); POLL=null; }
  TOKEN=null; ME=null; CURPOOL=null; CURPOOLNAME=''; POOLS=[];
  el('app').classList.add('hidden'); el('auth').classList.remove('hidden');
}
function editNick(){
  var n=prompt('Biệt danh mới:', ME.nickname); if(!n) return;
  srun('setNickname', TOKEN, n).then(function(r){ ME.nickname=r.nickname; el('me').textContent=r.nickname; msg('Đã đổi biệt danh ✨', true); }).catch(function(e){ msg(e.message||e); });
}

// ---- Tabs ----
function show(v){
  if(POLL){ clearInterval(POLL); POLL=null; }
  ['pools','bet','hist','lb','admin'].forEach(function(x){
    var view=el('view-'+x); if(view) view.classList.toggle('hidden', x!==v);
    var tab=el('t-'+x); if(tab) tab.classList.toggle('active', x===v);
  });
  // Chip tên sảnh: chỉ hiện ở các tab trong sảnh (bet/hist/lb) khi đã chọn sảnh.
  var pc=el('hdr-pool'); if(pc) pc.classList.toggle('hidden', !(CURPOOLNAME && (v==='bet'||v==='hist'||v==='lb')));
  if(v==='pools') loadPools();
  if(v==='bet'){ loadMatches(); POLL=setInterval(function(){ if(!el('stakebox')) loadMatches(); }, 240000); } // auto-refresh odds mỗi 4 phút (đọc sheet, 0 quota)
  if(v==='hist') loadHist();
  if(v==='lb') loadLb();
  if(v==='admin') loadAdmin();
}
var SEEN={}; // stale-while-revalidate: lần đầu mới hiện skeleton, lần sau giữ nội dung cũ + refetch ngầm
function spinner(id){ if(SEEN[id]) return; SEEN[id]=1; el('view-'+id).innerHTML='<div class="spin"></div>'; }
function relKick(k){
  var d=new Date(k); if(isNaN(d)) return '';
  var diff=d-Date.now(); if(diff<=0) return '';
  var mn=Math.floor(diff/60000), h=Math.floor(mn/60), dd=Math.floor(h/24);
  if(dd>=1) return 'còn '+dd+' ngày';
  if(h>=1) return 'còn '+h+'g'+(mn%60?' '+(mn%60)+'p':'');
  return 'còn '+mn+'p';
}
function betSkeleton(){
  if(SEEN.bet) return; SEEN.bet=1;
  function sk(){ return '<div class="card"><div class="sk" style="width:58%;height:18px"></div><div class="sk" style="width:34%;height:11px;margin-top:16px"></div><div style="display:flex;gap:8px;margin-top:9px"><div class="sk" style="flex:1;height:56px;border-radius:14px"></div><div class="sk" style="flex:1;height:56px;border-radius:14px"></div><div class="sk" style="flex:1;height:56px;border-radius:14px"></div></div></div>'; }
  el('view-bet').innerHTML='<div class="card headcard"><div class="sk" style="width:42%;height:12px"></div><div class="sk" style="width:28%;height:26px;margin-top:9px"></div></div>'+sk()+sk();
}

// ---- Pools ----
function loadPools(){
  spinner('pools');
  srun('getPools', TOKEN).then(function(pools){
    POOLS=pools; // nhớ để tra tên sảnh khi vào (selectPool)
    if(!pools.length){ el('view-pools').innerHTML='<div class="card center muted" style="padding:30px 16px">🏟️<div style="margin-top:8px">Chưa có sảnh nào đang mở.<br>Nhắn admin tạo sảnh nhé!</div></div>'; return; }
    function card(p){
      var lock=(!p.joined && (p.requirePassword))?'<span class="lockb" style="margin-left:7px">🔒</span>':'';
      var right=p.joined
        ? '<div style="display:flex;align-items:center;gap:10px"><div style="text-align:right"><div class="pts" style="font-size:17px">'+n2(p.currentPoints)+'</div><div class="muted" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.8px">điểm</div></div><button class="btn sm" onclick="selectPool(\''+p.poolId+'\','+p.currentPoints+')">Vào →</button></div>'
        : '<button class="btn sm" onclick="join(\''+p.poolId+'\','+((p.requirePassword)?'true':'false')+')">'+((p.requirePassword)?'🔒 ':'')+'Tham gia</button>';
      return '<div class="card"><div class="row"><div><div style="font-weight:800;font-size:16px">'+esc(p.name)+lock+'</div><div class="muted" style="margin-top:3px">👥 '+p.members+' người chơi'+(p.joined?' · <span style="color:var(--lime)">đã tham gia</span>':'')+'</div></div>'+right+'</div></div>';
    }
    var joined=pools.filter(function(p){return p.joined;}), other=pools.filter(function(p){return !p.joined;});
    var html='';
    if(joined.length) html+='<div class="muted" style="margin:4px 0 12px;font-weight:700;letter-spacing:.3px">SẢNH CỦA BẠN</div>'+joined.map(card).join('');
    if(other.length) html+='<div class="muted" style="margin:'+(joined.length?'18px':'4px')+' 0 12px;font-weight:700;letter-spacing:.3px">KHÁM PHÁ THÊM</div>'+other.map(card).join('');
    el('view-pools').innerHTML=html;
  }).catch(function(e){ msg(e.message||e); });
}
function join(poolId, locked){
  var pwd='';
  if(locked){ pwd=prompt('Sảnh này cần mật khẩu để tham gia:'); if(pwd==null) return; }
  srun('joinPool', TOKEN, poolId, pwd).then(function(r){ msg('Vào sảnh thành công! Bạn có '+r.startingPoints+' điểm để chinh chiến 🎉', true); loadPools(); }).catch(function(e){ msg(e.message||e); });
}
function selectPool(poolId, pts){
  CURPOOL=poolId; var p=POOLS.filter(function(x){return x.poolId===poolId;})[0]; CURPOOLNAME=p?p.name:'';
  updatePoolChip(); setPts(pts); el('t-bet').disabled=false; el('t-hist').disabled=false; el('t-lb').disabled=false;
  var cm=lsGet('matches'); if(cm && cm.v){ applyMatches(cm.v); } else { SEEN.bet=0; betSkeleton(); } // paint last-known instantly, else skeleton
  // 1 RPC warms matches + leaderboard + history; localStorage cache makes later tab switches instant.
  srun('getPoolView', TOKEN, poolId).then(function(pv){
    lsSet('matches',pv.matches); lsSet('lb',pv.leaderboard); lsSet('hist',pv.history);
    applyLb(pv.leaderboard);   // rank chip (renders hidden LB too -> tab switch instant)
    applyHist(pv.history);     // streak chip + new-win toast
    show('bet');               // loadMatches paints from the fresh cache just written (no extra RPC)
  }).catch(function(e){ msg(e.message||e); show('bet'); });
}
function updatePoolChip(){ var c=el('hdr-pool'); if(c) c.innerHTML='<span class="ps-k">Sảnh</span><span class="ps-n">'+esc(CURPOOLNAME||'')+'</span><span class="ps-x">▾</span>'; }

// ---- Matches / Bet ----
function loadMatches(force){
  if(!CURPOOL){ el('view-bet').innerHTML='<div class="card center muted" style="padding:26px">⚽<div style="margin-top:8px">Chọn một sảnh ở tab Sảnh trước nhé.</div></div>'; return; }
  swr('matches', function(){ return srun('getMatches', TOKEN, CURPOOL); }, applyMatches, betSkeleton, force);
}
function applyMatches(res){
  STAKE={min:res.minStake, max:res.maxStake, step:res.step};
  if(res.currentPoints!=null) setPts(res.currentPoints);
  var ms=res.matches; MATCHES=ms;
  if(el('stakebox')) return; // đang mở phiếu cược -> đừng vẽ lại kẻo mất ô nhập của user
  var adminBtn=(ME&&ME.isAdmin)?'<button class="btn ghost sm" onclick="reloadOdds()">🔄 Reload odds</button>':'';
  var head='<div class="card row headcard" style="align-items:center"><div style="display:flex;align-items:center;gap:13px"><div style="width:46px;height:46px;border-radius:14px;background:var(--accent-soft);border:1px solid var(--accent-bd);display:flex;align-items:center;justify-content:center;font-size:23px;flex:none">👛</div><div><div class="muted" style="font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700">Ví điểm của bạn</div><div class="pts" style="font-size:27px;line-height:1.15">'+n2(CURPOOLPTS)+' <span style="font-size:15px">đ</span></div></div></div>'+adminBtn+'</div>';
  if(!ms.length){ el('view-bet').innerHTML=head+'<div class="card center muted" style="padding:24px">📭<div style="margin-top:6px">Chưa có trận nào trong 48 giờ tới.</div></div>'; return; }
  el('view-bet').innerHTML=head+'<div class="muted" style="margin:6px 2px 12px;font-weight:700;letter-spacing:.3px">CHỌN KÈO — '+ms.length+' TRẬN</div>'+ms.map(matchCard).join('');
}
function matchCard(m){
  var when=fmtKick(m.kickoff);
  var byMkt={}; m.myBets.forEach(function(b){ (byMkt[b.marketType]=byMkt[b.marketType]||[]).push(b); });
  var kickChip=m.open
    ? '<span class="kick">⏱ <b style="font-weight:800">'+esc(relKick(m.kickoff)||when)+'</b><span style="opacity:.7;margin-left:5px">'+when+'</span></span>'
    : '<span class="closed">ĐÃ ĐÓNG</span>';
  // mặc định: trận trong 24h tới -> mở; xa hơn -> thu gọn (vẫn bấm để mở).
  var collapsed=(new Date(m.kickoff).getTime()-Date.now())>24*3600000;
  // thân kèo
  var body='';
  if(!m.odds){ body='<div class="muted" style="margin-top:12px">🔒 Odds chưa mở (mở 24h trước trận).</div>'; }
  else {
    if(m.odds.m1x2){ var x=m.odds.m1x2;
      body+='<div class="mkt">Thắng / Hòa / Thua</div><div class="odds-grid">'+
        oddBtn(m,'1x2',x.home.oid,'1 · '+short(m.team1),x.home.price)+
        oddBtn(m,'1x2',x.draw.oid,'Hòa',x.draw.price)+
        oddBtn(m,'1x2',x.away.oid,'2 · '+short(m.team2),x.away.price)+'</div>'+betLines(byMkt['1x2'],m); }
    if(m.odds.mou){ var o=m.odds.mou;
      body+='<div class="mkt">Tài / Xỉu bàn <span class="ln">'+o.line+'</span></div><div class="odds-grid">'+
        oddBtn(m,'ou',o.over.oid,'Tài bàn',o.over.price)+
        oddBtn(m,'ou',o.under.oid,'Xỉu bàn',o.under.price)+'</div>'+betLines(byMkt['ou'],m); }
    if(m.odds.mah){ var ah=m.odds.mah, hl=(ah.line>0?'+':'')+ah.line, al=(-ah.line>0?'+':'')+(-ah.line);
      body+='<div class="mkt">Chấp <span class="ln">'+esc(short(m.team1))+' '+hl+'</span></div><div class="odds-grid">'+
        oddBtn(m,'ah',ah.home.oid,short(m.team1)+' '+hl,ah.home.price)+
        oddBtn(m,'ah',ah.away.oid,short(m.team2)+' '+al,ah.away.price)+'</div>'+betLines(byMkt['ah'],m); }
    // kèo mở rộng do admin bật cho cả sảnh (vd tài/xỉu góc) — cùng cấu hình cho mọi trận trong sảnh
    EXTRA_MKT_LIB.forEach(function(item){
      var eo=m.odds[item.key]; if(!eo) return;
      body+='<div class="mkt">'+esc(item.label)+' <span class="ln">'+eo.line+'</span></div><div class="odds-grid">'+
        oddBtnQ(m,item.key,eo.over.oid,item.over||'Tài',eo.over.price)+
        oddBtnQ(m,item.key,eo.under.oid,item.under||'Xỉu',eo.under.price)+'</div>'+betLines(byMkt[item.key],m);
    });
    // kèo tuỳ chỉnh riêng cho trận này — admin đặt tên & tỷ lệ, và admin TỰ CHẤM kết quả (không lấy từ bookmaker)
    (m.customMarkets||[]).forEach(function(cm){ body+=customMarketBlock(m,cm,byMkt); });
    if(isAdmin()) body+='<button class="addmkt" onclick="openAddCustomMarket(\''+m.fixtureId+'\')">➕ Thêm kèo riêng cho trận này</button>';
    if(m.myBets.length){ body+='<button class="crowdbtn" onclick="loadCrowd(\'bet\',\''+m.fixtureId+'\',this)">👥 Xem mọi người ▾</button><div class="crowd" id="bet_crowd_'+m.fixtureId+'" data-open="0"></div>'; }
  }
  var betDot=m.myBets.length?'<span class="bdot" style="margin-left:6px"></span>':'';
  return '<div class="card'+(m.open?'':' mc-closed')+(collapsed?'':' open')+'" id="mc_'+m.fixtureId+'">'+
    '<div class="row mc-head" style="align-items:flex-start;cursor:pointer" onclick="toggleMatch(\''+m.fixtureId+'\')">'+
      '<div class="teams">'+teamFlag(m.team1)+esc(m.team1)+'<span class="vs">vs</span>'+teamFlag(m.team2)+esc(m.team2)+betDot+'</div>'+
      '<div style="display:flex;align-items:center;gap:8px;flex:none">'+kickChip+'<span class="hchev">▾</span></div>'+
    '</div>'+
    '<div class="mc-body'+(collapsed?' collapsed':'')+'" id="mb_'+m.fixtureId+'">'+body+'</div>'+
  '</div>';
}

// Trận đã bắt đầu -> rời tab này sang tab Kết quả; việc chấm kết quả nằm ở đó.
function customMarketBlock(m,cm,byMkt){
  var mt='c_'+cm.cid, admin=isAdmin();
  var tools=admin?'<span class="mkt-tools"><button class="mkt-tool" title="Sửa tên/tỷ lệ" onclick="event.stopPropagation();openEditCustomMarket(\''+m.fixtureId+'\',\''+cm.cid+'\')">✏️</button><button class="mkt-tool" title="Xoá kèo (hoàn điểm)" onclick="event.stopPropagation();deleteCustomMarket(\''+m.fixtureId+'\',\''+cm.cid+'\')">🗑</button></span>':'';
  var head='<div class="mkt">'+esc(cm.name)+tools+'</div>';
  var grid='<div class="odds-grid">'+(cm.outcomes||[]).map(function(oc){ return oddBtnQ(m,mt,oc.oid,oc.label,oc.price); }).join('')+'</div>';
  return head+grid+betLines(byMkt[mt],m);

function toggleMatch(fid){ var c=el('mc_'+fid), b=el('mb_'+fid); if(c)c.classList.toggle('open'); if(b)b.classList.toggle('collapsed'); }
function mktDisplayName(mtype){
  if(mtype==='1x2') return 'Thắng / Hòa / Thua'; if(mtype==='ou') return 'Tài / Xỉu'; if(mtype==='ah') return 'Chấp';
  var ext=EXTRA_MKT_LIB.filter(function(it){return it.key===mtype;})[0]; if(ext) return ext.label;
  if(mtype.indexOf('c_')===0){ var cid=mtype.slice(2); var m=(MATCHES||[]).filter(function(x){return (x.customMarkets||[]).some(function(c){return c.cid===cid;});})[0];
    var cm=m?(m.customMarkets||[]).filter(function(c){return c.cid===cid;})[0]:null; return cm?cm.name:mtype; }
  return mtype;
}
// Nhãn NGẮN cho badge kèo (cửa cược đã ghi rõ loại rồi, badge chỉ cần họ kèo).
function mktTag(mtype){
  if(mtype==='1x2') return '1X2'; if(mtype==='ou') return 'Tài/Xỉu'; if(mtype==='ah') return 'Chấp';
  if(mtype==='corner_1h'||mtype==='corner_ft') return 'Góc'; if(mtype==='card_ft') return 'Thẻ';
  if(mtype&&mtype.indexOf('c_')===0) return 'Riêng';
  return mtype;
}

function finalizeMarket(fid,cid){

// Gộp kèo trùng (cùng loại + cùng cửa + cùng odds + cùng kết quả) -> 1 dòng, cộng dồn stake & payout.
// vd cược 1X2 3 lần 200@1.9 -> hiện 600@1.9. Cửa khác/odds khác/kết quả khác vẫn tách riêng.
function mergeBets(list){
  var by={}, out=[];
  (list||[]).forEach(function(b){
    var id=(b.outcomeId!=null?b.outcomeId:(b.oid!=null?b.oid:b.label));
    var k=b.marketType+'|'+id+'|'+b.lockedOdds+'|'+(b.result||'');
    var g=by[k];
    if(!g){ g=by[k]={ marketType:b.marketType, outcomeId:b.outcomeId, oid:b.oid, label:b.label, lockedOdds:b.lockedOdds, result:b.result, stake:0, payout:0 }; out.push(g); }
    g.stake+=Number(b.stake)||0; g.payout+=Number(b.payout)||0;
  });
  return out;
}
function betLines(list, m){
  if(!list||!list.length) return '';
  var tot=list.reduce(function(s,b){return s+b.stake;},0);
  var parts=mergeBets(list).map(function(b){ var lbl=outcomeLabel(m,b.marketType,b.outcomeId!=null?b.outcomeId:b.oid); return '<div class="mybet-line">'+(lbl?'<b>'+esc(lbl)+'</b> ':'')+b.stake+'đ @ '+b.lockedOdds+'</div>'; });
  return '<div class="mybet"><span class="bdot"></span>Đã cược'+parts.join('')+'<div class="mybet-line" style="opacity:.7;font-weight:600">(tổng '+tot+'/'+STAKE.max+'đ)</div></div>';
}
function outcomeLabel(m, mtype, oid){
  var eq=function(a,b){return String(a)===String(b);}; // oid: backend string vs odds number
  if(mtype.indexOf('c_')===0){ var ccid=mtype.slice(2); var ccm=((m&&m.customMarkets)||[]).filter(function(c){return c.cid===ccid;})[0];
    if(ccm){ var coc=(ccm.outcomes||[]).filter(function(x){return eq(x.oid,oid);})[0]; return coc?coc.label:''; } return ''; }
  var extLib=EXTRA_MKT_LIB.filter(function(it){return it.key===mtype;})[0];
  if(extLib){ var eo=m&&m.odds&&m.odds[mtype]; if(eo){ if(eq(oid,eo.over.oid)) return 'Tài '+eo.line; if(eq(oid,eo.under.oid)) return 'Xỉu '+eo.line; } return ''; }
  var o=m&&m.odds; if(!o) return '';
  if(mtype==='1x2' && o.m1x2){ var x=o.m1x2; if(eq(oid,x.home.oid)) return m.team1; if(eq(oid,x.draw.oid)) return 'Hòa'; if(eq(oid,x.away.oid)) return m.team2; }
  if(mtype==='ou' && o.mou){ var u=o.mou; if(eq(oid,u.over.oid)) return 'Tài '+u.line; if(eq(oid,u.under.oid)) return 'Xỉu '+u.line; }
  if(mtype==='ah' && o.mah){ var a=o.mah, hl=(a.line>0?'+':'')+a.line, al=(-a.line>0?'+':'')+(-a.line); if(eq(oid,a.home.oid)) return short(m.team1)+' '+hl; if(eq(oid,a.away.oid)) return short(m.team2)+' '+al; }
  return '';
}
function oddBtn(m,mtype,oid,label,price){
  var disabled=m.open?'':'disabled';
  var id='o_'+m.fixtureId+'_'+mtype+'_'+oid;
  var mv=(m.moves||{})[mtype+'_'+oid]; // server tính: 1 tăng / -1 giảm so với lần cập nhật odds trước
  var arr=mv ? (mv>0?'<span class="oar up">▲</span>':'<span class="oar dn">▼</span>') : '';
  var flashCls=mv ? (mv>0?' flash-up':' flash-dn') : '';
  return '<button class="odd'+flashCls+'" id="'+id+'" '+disabled+' onclick="pick(\''+m.fixtureId+'\',\''+mtype+'\','+oid+','+price+')"><span class="lbl">'+esc(label)+'</span><span class="val">'+price+arr+'</span></button>';
}
// giống oddBtn nhưng oid là chuỗi (kèo mở rộng / kèo tuỳ chỉnh dùng oid dạng "f1_corner_1h_over") — không đụng đến 3 kèo mặc định.
function oddBtnQ(m,mtype,oid,label,price){
  var disabled=m.open?'':'disabled';
  var id='o_'+m.fixtureId+'_'+mtype+'_'+oid;
  var mv=(m.moves||{})[mtype+'_'+oid];
  var arr=mv ? (mv>0?'<span class="oar up">▲</span>':'<span class="oar dn">▼</span>') : '';
  var flashCls=mv ? (mv>0?' flash-up':' flash-dn') : '';
  return '<button class="odd'+flashCls+'" id="'+id+'" '+disabled+' onclick="pick(\''+m.fixtureId+'\',\''+mtype+'\',\''+oid+'\','+price+')"><span class="lbl">'+esc(label)+'</span><span class="val">'+price+arr+'</span></button>';
}
function pick(fixtureId,mtype,oid,price){
  if(SEL && SEL.fixtureId===fixtureId && SEL.mtype===mtype && SEL.oid===oid && el('stakebox')){ cancelBet(); return; }
  var m=MATCHES.filter(function(x){return x.fixtureId===fixtureId;})[0];
  var used=(m?m.myBets:[]).filter(function(b){return b.marketType===mtype;}).reduce(function(s,b){return s+b.stake;},0);
  var remaining=STAKE.max-used;
  if(remaining<STAKE.min){ msg('Kèo này đã đạt mức tối đa '+STAKE.max+'đ rồi'); return; }
  SEL={fixtureId:fixtureId,mtype:mtype,oid:oid,price:price,remaining:remaining};
  document.querySelectorAll('.odd.sel').forEach(function(b){ b.classList.remove('sel'); });
  el('o_'+fixtureId+'_'+mtype+'_'+oid).classList.add('sel');
  openStake();
}
function reloadOdds(){
  msg('Đang tải lại odds...', true);
  srun('adminRefreshOdds', TOKEN).then(function(){ msg('Đã reload odds ✓', true); loadMatches(true); }).catch(function(e){ msg(e.message||e); });
}
function openStake(){
  var old=el('stakebox'); if(old) old.remove();
  var box=document.createElement('div'); box.id='stakebox'; box.className='card';
  var mname=mktDisplayName(SEL.mtype);
  var m=MATCHES.filter(function(x){return x.fixtureId===SEL.fixtureId;})[0];
  var matchName=m?(m.team1+' vs '+m.team2):'';
  var selBtn=el('o_'+SEL.fixtureId+'_'+SEL.mtype+'_'+SEL.oid);
  var pickLbl=selBtn?selBtn.querySelector('.lbl').textContent:'';
  // Trần đặt = min(còn lại của kèo, ví hiện tại), làm tròn xuống bội số step để Max luôn hợp lệ.
  var wallet=Number(CURPOOLPTS); if(!(wallet>=0)) wallet=SEL.remaining;
  SEL.cap=Math.min(SEL.remaining, Math.floor(wallet/STAKE.step)*STAKE.step);
  box.innerHTML='<div class="slip-head"><span class="pill">'+esc(mname)+'</span><div style="flex:1;min-width:0"><div class="slip-sel">'+esc(pickLbl)+' <span style="color:var(--lime)">@ '+SEL.price+'</span></div><div class="slip-match">'+esc(matchName)+'</div></div></div>'+
    '<div class="muted" style="font-size:12px;margin-top:9px">Điểm cược · '+STAKE.min+'–'+SEL.cap+'đ · bội số '+STAKE.step+(SEL.cap<SEL.remaining?' · giới hạn theo ví':'')+'</div>'+
    '<div class="quick">'+
      '<button onclick="stepStake(-1)">−</button><button onclick="stepStake(1)">+</button><button onclick="setStake('+SEL.cap+')">Max</button>'+
    '</div>'+
    '<div class="stake-row"><input id="stakeval" type="number" min="'+STAKE.min+'" max="'+SEL.cap+'" step="'+STAKE.step+'" value="'+STAKE.min+'" oninput="updateWin()"><button id="betbtn" class="btn" onclick="confirmBet()">Đặt kèo</button><button class="btn ghost" onclick="cancelBet()">Huỷ</button></div>'+
    '<div class="winbox"><span style="color:var(--mut);font-weight:700">Thắng kèo nhận về</span><b id="wininfo" style="color:var(--win);font-size:20px;font-weight:900"></b></div>';
  var card=el('mc_'+SEL.fixtureId);
  if(card && card.parentNode) card.parentNode.insertBefore(box, card.nextSibling); else el('view-bet').appendChild(box);
  updateWin();
  box.scrollIntoView({behavior:'smooth', block:'nearest'});
}
function setStake(v){ var i=el('stakeval'); if(i){ i.value=v; updateWin(); } }
function stepStake(dir){ var i=el('stakeval'); if(!i) return; var v=(Number(i.value)||0)+dir*STAKE.step; v=Math.max(STAKE.min, Math.min(SEL.cap, v)); setStake(v); }
function updateWin(){
  var inp=el('stakeval'); var w=el('wininfo'); if(!inp||!w) return;
  var s=Number(inp.value)||0;
  w.textContent=Math.round(s*SEL.price)+'đ';
}
function cancelBet(){ SEL=null; var b=el('stakebox'); if(b)b.remove(); document.querySelectorAll('.odd.sel').forEach(function(x){x.classList.remove('sel')}); }
var BETTING=false;
function confirmBet(){
  if(BETTING) return; // chống double-click khi server còn đang xử lý
  var stake=Number(el('stakeval').value);
  if(!(stake>=STAKE.min&&stake<=SEL.cap&&stake%STAKE.step===0)){ msg('Điểm cược phải là bội số của '+STAKE.step+', từ '+STAKE.min+' đến '+SEL.cap+(SEL.cap<SEL.remaining?' (giới hạn theo ví)':'')); return; }
  BETTING=true; var btn=el('betbtn'); if(btn){ btn.disabled=true; btn.textContent='Đang đặt…'; }
  srun('placeBet', TOKEN, CURPOOL, SEL.fixtureId, SEL.mtype, SEL.oid, stake).then(function(r){

  }).catch(function(e){ msg(e.message||e); }).then(function(){ BETTING=false; });
}

// Admin: hàng đợi chấm kèo tự ra — hiện ở đầu tab Kết quả. Đọc từ MATCHES (đã được getPoolView làm ấm khi chọn sảnh).
function settleQueueHtml(){
  if(!(ME&&ME.isAdmin)) return '';
  var pend=[], done=[], stuck=[];
  (HIST||[]).forEach(function(m){
    if(m.upcoming) return; // trận chưa bắt đầu -> chưa tới lúc chấm
    (m.customMarkets||[]).forEach(function(cm){
      if(cm.locked) return; // đã chốt hoàn toàn -> đóng, rời hàng đợi
      var settled=(cm.result!=null&&cm.result!=='');
      (settled?done:pend).push({m:m,cm:cm});
    });
    // Kèo tự ra bị KẸT (auto-settle bó tay quá lâu) -> chấm tay, dùng lại panel chọn cửa.
    (m.stuckMarkets||[]).forEach(function(sm){ stuck.push({m:m,sm:sm}); });
  });
  var n=pend.length+done.length+stuck.length;
  if(!n) return '';
  var html='<div class="card sq-card">'+
    '<div class="sq-head">✅ Chấm kèo tự ra<span class="sq-count">'+n+'</span></div>'+
    '<div class="muted" style="font-size:12px;line-height:1.5;margin:-2px 0 10px">Bấm chọn cửa thắng để chấm — điểm cộng/trừ ngay, vẫn sửa lại được. Xong xuôi thì <b>🔒 Chốt</b> để khoá & bỏ khỏi danh sách. Kèo mặc định tự chốt theo bookmaker.</div>';
  if(stuck.length){ html+='<div class="sq-sub" style="color:var(--lose)">⚠️ Kẹt — cần chấm tay · '+stuck.length+'</div>'+stuck.map(stuckItem).join(''); }
  if(pend.length){ html+='<div class="sq-sub">Chờ chấm · '+pend.length+'</div>'+pend.map(settleItem).join(''); }
  if(done.length){ html+='<div class="sq-sub">Đã chấm — chờ chốt · '+done.length+'</div>'+done.map(settleItem).join(''); }
  return html+'</div>';
}
// Kèo chuẩn bị kẹt: cùng khung sq-item, chọn cửa thắng -> doSettleStd. Chấm xong bet có result -> tự rời hàng đợi.
function stuckItem(it){
  var m=it.m, sm=it.sm, fid=m.fixtureId, mt=sm.marketType, key=fid+'_'+mt;
  var mn=esc(m.team1)+' vs '+esc(m.team2), sc=m.score?' · '+esc(m.score.replace('-',' - ')):'';

    '<div class="sq-opts">'+opts+'</div>'+
    '<button class="sq-refund" onclick="doSettleStd(\''+fid+'\',\''+mt+'\',\'VOID\')">↩︎ Hoàn cả kèo — trả điểm mọi người</button>'+

function doSettleStd(fid,mt,win){
  srun('adminSettleStdMarket', TOKEN, CURPOOL, fid, mt, win).then(function(){ msg(win==='VOID'?'Đã hoàn kèo — trả điểm mọi người ✓':'Đã chấm kèo ✓', true); loadMatches(true); try{ loadHist(true); }catch(e){} }).catch(function(e){ msg(e.message||e); });
}
// Một dòng trong hàng đợi: header + panel chọn cửa thắng (ẩn, bấm "Chấm/Sửa" mới mở).
function settleItem(it){
  var m=it.m, cm=it.cm, fid=m.fixtureId, cid=cm.cid, key=fid+'_'+cid;
  var mn=esc(m.team1)+' vs '+esc(m.team2);
  var settled=(cm.result!=null&&cm.result!=='');
  var voided=(cm.result==='VOID');
  var winLbl=voided?'Đã hoàn':(((cm.outcomes||[]).filter(function(o){return String(o.oid)===String(cm.result);})[0]||{}).label||'?');
  var sub=settled
    ? mn+' · <span class="sq-res '+(voided?'void':'win')+'">'+(voided?'↩︎ ':'🏆 ')+esc(winLbl)+'</span>'

  var actions=settled
    ? '<div class="sq-actions"><button class="sq-btn ghost" onclick="toggleSettlePanel(\''+key+'\')">↻ Sửa ▾</button><button class="sq-btn lock" onclick="finalizeMarket(\''+fid+'\',\''+cid+'\')">🔒 Chốt</button></div>'
    : '<button class="sq-btn" onclick="toggleSettlePanel(\''+key+'\')">Chấm ▾</button>';
  var opts=(cm.outcomes||[]).map(function(oc){ var cur=(String(cm.result)===String(oc.oid)); return '<button class="sq-opt'+(cur?' cur':'')+'" onclick="doSettleMarket(\''+fid+'\',\''+cid+'\',\''+oc.oid+'\')">'+esc(oc.label)+' <span class="sq-oo">@ '+oc.price+'</span>'+(cur?'<span class="sq-cur">đang chọn</span>':'')+'</button>'; }).join('');
  var refundCur=(cm.result==='VOID');
  var panel='<div class="sq-panel" id="sqp_'+key+'" style="display:none">'+
    '<div class="sq-hint">'+(settled?'Chọn lại cửa thắng — điểm tính lại theo kết quả mới.':'Chọn cửa THẮNG. Các cửa còn lại thua. Điểm áp ngay, sửa lại được.')+'</div>'+
    '<div class="sq-opts">'+opts+'</div>'+
    '<button class="sq-refund'+(refundCur?' cur':'')+'" onclick="doSettleMarket(\''+fid+'\',\''+cid+'\',\'VOID\')">↩︎ Hoàn cả kèo — trả điểm mọi người'+(refundCur?' · đang chọn':'')+'</button>'+
    '</div>';
  return '<div class="sq-item'+(settled?' done':'')+'"><div class="sq-row"><div class="sq-info"><div class="sq-name">🎯 '+esc(cm.name)+'</div><div class="sq-match">'+sub+'</div></div>'+actions+'</div>'+panel+'</div>';
}
function toggleSettlePanel(key){ var p=el('sqp_'+key); if(!p) return; p.style.display=(!p.style.display||p.style.display==='none')?'block':'none'; }
function renderHist(){
  if(!HIST.length){ el('view-hist').innerHTML=settleQueueHtml()+'<div class="card center muted" style="padding:30px">🧾<div style="margin-top:8px">Chưa có gì ở đây.<br>Đặt kèo hoặc chờ trận kết thúc nhé!</div></div>'; return; }
  var rows=HIST.filter(function(m){ return HFILTER==='all' || (HFILTER==='upcoming'? m.upcoming : !m.upcoming); });
  var fin=HIST.filter(function(m){ return !m.upcoming; });
  var totalNet=fin.reduce(function(s,m){ return s+m.net; },0);
  var tCol=totalNet>0?'var(--win)':(totalNet<0?'var(--lose)':'var(--mut)');
  var decided=fin.filter(function(m){ return m.bets && m.bets.some(function(b){return b.result;}); });
  // Thắng/Thua/Hoà tính theo KÈO; cược cùng 1 kèo nhiều lần chỉ tính 1 (dedupe theo cửa cược).
  var wins=0, loss=0, draw=0, seen={};
  fin.forEach(function(m){ m.bets.forEach(function(b){ if(!b.result) return;
    var k=m.fixtureId+'|'+b.marketType+'|'+b.label; if(seen[k]) return; seen[k]=1;
    if(b.payout>b.stake) wins++; else if(b.payout<b.stake) loss++; else draw++; }); });
  var wr=(wins+loss)>0?Math.round(wins/(wins+loss)*100):0;
  var counts={all:HIST.length, upcoming:HIST.filter(function(m){return m.upcoming;}).length, finished:fin.length};
  function fbtn(f,label){ return '<button class="'+(HFILTER===f?'on':'')+'" onclick="setHFilter(\''+f+'\')">'+label+'<span class="cnt">'+counts[f]+'</span></button>'; }
  var stats=decided.length?'<div class="hstats">'+
      '<div class="hstat"><div class="hsv" style="color:var(--win)">'+wins+'</div><div class="hsl">Thắng</div></div>'+
      '<div class="hstat"><div class="hsv" style="color:var(--lose)">'+loss+'</div><div class="hsl">Thua</div></div>'+
      '<div class="hstat"><div class="hsv">'+draw+'</div><div class="hsl">Hoà</div></div>'+
      '<div class="hstat"><div class="hsv" style="color:var(--lime)">'+wr+'%</div><div class="hsl">Tỉ lệ</div></div>'+
    '</div>':'';
  var head='<div class="card headcard"><div class="row"><div class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:1px">Tổng kết quả đã chốt</div><div class="hnet" style="color:'+tCol+'">'+(totalNet>0?'+':'')+n2(totalNet)+'đ</div></div>'+stats+'</div>'+
    '<div class="seg" style="margin-bottom:12px">'+fbtn('all','Tất cả')+fbtn('upcoming','Sắp tới')+fbtn('finished','Đã xong')+'</div>';
  var body=rows.length?rows.map(histCard).join(''):'<div class="card center muted" style="padding:26px">📦<div style="margin-top:8px">Không có trận trong mục này.</div></div>';
  el('view-hist').innerHTML=settleQueueHtml()+head+body;
}
function histCard(m,i){
  var when=fmtKick(m.kickoff);
  var pendingOnly=m.net===0 && m.staked>0;
  var win=(!pendingOnly&&!m.upcoming&&m.net>0), lose=(!pendingOnly&&!m.upcoming&&m.net<0);
  var hcls=win?' win':(lose?' lose':'');
  var iconHtml = win ? '<span class="hicon" style="background:var(--win-soft);color:var(--win)">✓</span>'
                     : (lose ? '<span class="hicon" style="background:var(--lose-soft);color:var(--lose)">✕</span>' : '');
  var badgeStr, badgeBg, badgeCol;
  if(pendingOnly){ badgeStr=m.settled?'±0đ':('🎟️ '+m.staked+'đ'); badgeBg='var(--inputbg)'; badgeCol='var(--mut)'; }
  else if(m.net>0){ badgeStr='+'+n2(m.net)+'đ'; badgeBg='var(--win-soft)'; badgeCol='var(--win)'; }
  else if(m.net<0){ badgeStr=n2(m.net)+'đ'; badgeBg='var(--lose-soft)'; badgeCol='var(--lose)'; }
  else { badgeStr=m.upcoming?'—':'±0đ'; badgeBg='var(--inputbg)'; badgeCol='var(--mut)'; }
  var mid=m.score?'<span class="score">'+esc(m.score.replace('-',' - '))+'</span>':'<span class="vs">vs</span>';
  var tag=m.upcoming?'<span class="chip glass" style="padding:2px 9px">sắp tới</span>':(m.settled?'<span class="chip glass" style="padding:2px 9px">đã xong</span>':'<span class="closed" style="padding:2px 9px">chờ KQ</span>');
  var lines;
  if(m.bets.length){
    lines=mergeBets(m.bets).map(function(b){
      var lbl=mktTag(b.marketType);
      var pick=b.label||b.pick||b.outcomeLabel||'';
      var pickHtml=pick?'<b>'+esc(pick)+'</b> · ':'';
      if(!b.result){
        return '<div class="hbetrow"><span class="mtag">'+lbl+'</span><span>'+pickHtml+b.stake+'đ @ '+b.lockedOdds+'</span><span class="hr" style="color:var(--mut)">'+(m.upcoming?'chưa đá':'chờ KQ')+'</span></div>';
      }
      var d=Math.round(b.payout-b.stake), dCol=d>0?'var(--win)':(d<0?'var(--lose)':'var(--mut)');
      return '<div class="hbetrow"><span class="mtag">'+lbl+'</span><span>'+pickHtml+b.stake+'đ @ '+b.lockedOdds+' · '+esc(b.result)+'</span><span class="hr" style="color:'+dCol+'">'+(d>0?'+':(d<0?'':'±'))+d+'đ</span></div>';
    }).join('');
  } else { lines='<div class="hbetrow" style="color:var(--mut)">'+(m.penalized?'Không tham gia → phạt '+n2(m.net)+'đ':'Không cược')+'</div>'; }
  return '<div class="card hcard'+hcls+'" id="hc_'+i+'" onclick="toggleHist('+i+')"><div class="row"><div class="teams" style="font-size:15.5px">'+iconHtml+teamFlag(m.team1)+esc(m.team1)+mid+teamFlag(m.team2)+esc(m.team2)+'</div>'+
    '<div class="hbadge" style="background:'+badgeBg+';color:'+badgeCol+'">'+badgeStr+'</div></div>'+
    '<div class="det" style="display:flex;align-items:center;gap:7px;margin-top:8px">'+tag+'<span>'+when+'</span><span style="margin-left:auto">'+(m.bets.length?m.bets.length+' kèo <span class="hchev">▾</span>':'—')+'</span></div>'+
    '<div id="hd_'+i+'" class="hidden hdet" style="margin-top:8px">'+lines+
      (m.upcoming?'':'<button class="crowdbtn" onclick="event.stopPropagation();loadCrowd(\'hist\',\''+m.fixtureId+'\',this)">👥 Xem mọi người ▾</button><div class="crowd" id="hist_crowd_'+m.fixtureId+'" data-open="0"></div>')+
    '</div></div>';
}

// ---- Crowd: xem mọi người cược gì ----
function loadCrowd(scope,fixtureId,btn){
  var host=el(scope+'_crowd_'+fixtureId); if(!host) return;
  if(host.getAttribute('data-open')==='1'){ host.innerHTML=''; host.setAttribute('data-open','0'); btn.textContent=btn.textContent.replace('▴','▾'); return; }
  host.innerHTML='<div class="muted" style="padding:8px 2px">Đang tải…</div>'; host.setAttribute('data-open','1'); btn.textContent=btn.textContent.replace('▾','▴');
  srun('getCrowd', TOKEN, CURPOOL, fixtureId).then(function(c){ CROWD_CACHE[host.id]=c; host.innerHTML=crowdHtml(c, host.id); }).catch(function(e){ host.innerHTML='<div class="muted" style="padding:8px 2px">'+esc(e.message||e)+'</div>'; });

var CROWD_CACHE={}; var CROWD_METRIC='people';
function setCrowdMetric(hostId, m){ CROWD_METRIC=m; var h=el(hostId); if(h && CROWD_CACHE[hostId]) h.innerHTML=crowdHtml(CROWD_CACHE[hostId], hostId); }
// Mobile: chạm thanh -> hiện số (desktop đã có hover title). Đọc từ title nên khỏi lo escape tên đội.
function segTip(ev, node){ if(ev) ev.stopPropagation(); var t=node.getAttribute('title'); if(t) msg(t, true); }
function crowdHtml(c, hostId){
  if(c.locked) return '<div class="muted" style="padding:8px 2px">🔒 Đặt kèo trận này để xem mọi người chọn gì.</div>';
  if(!c.agg.length) return '<div class="muted" style="padding:8px 2px">Chưa ai cược trận này.</div>';
  var byM={}; c.agg.forEach(function(a){ (byM[a.marketType]=byM[a.marketType]||[]).push(a); });
  var pal=['var(--lime)','var(--cyan)','var(--gold)','var(--lose)'];
  var metric=CROWD_METRIC;
  // Trận đã đóng (c.bets) -> chỉ hiện chi tiết "ai cược gì": bỏ caption + thanh tỉ lệ + toggle.
  var html=c.bets?'':('<div class="ctop"><div class="ct">Càng đông càng thua =)))</div>'+
    '<div class="cmetric">'+
      '<button class="'+(metric==='people'?'on':'')+'" onclick="setCrowdMetric(\''+hostId+'\',\'people\')">Người</button>'+
      '<button class="'+(metric==='stake'?'on':'')+'" onclick="setCrowdMetric(\''+hostId+'\',\'stake\')">Điểm</button>'+
    '</div></div>');
  if(!c.bets) Object.keys(byM).forEach(function(mt){
    var arr=byM[mt].slice().sort(function(a,b){ return (metric==='people'?b.n-a.n:b.stake-a.stake); });
    var totN=arr.reduce(function(s,a){return s+a.n;},0), totS=arr.reduce(function(s,a){return s+a.stake;},0);
    var tot=(metric==='people'?totN:totS)||1;
    html+='<div class="mblock"><div class="mhead"><span class="mh-l">'+esc(mktDisplayName(mt))+'</span><span class="mh-r">'+(metric==='people'?totN+' người':totS+'đ')+'</span></div>';
    html+='<div class="cbar">'+arr.map(function(a,i){ var val=metric==='people'?a.n:a.stake; var pct=Math.round(val/tot*100);
      var tip=esc(a.label)+': '+(metric==='people'?a.n+' người':a.stake+'đ'); // hover/tap hiện số thực theo metric
      return '<div class="cseg" title="'+tip+'" onclick="segTip(event,this)" style="flex:'+pct+' '+pct+' 0;background:'+pal[i%pal.length]+';cursor:pointer"></div>'; }).join('')+'</div>';
    html+='<div class="cinline">'+arr.map(function(a,i){ var val=metric==='people'?a.n:a.stake; var pct=Math.round(val/tot*100);
      return '<span class="citem"><span class="cdot" style="background:'+pal[i%pal.length]+'"></span><span class="ci-n">'+esc(a.label)+'</span><span class="ci-p">'+pct+'%</span></span>'; }).join('')+'</div></div>';
  });
  if(c.bets){
    html+='<div class="cmkt">Ai cược gì</div>';
    html+=c.bets.map(function(b){
      var net='';
      if(b.result){
        var n=(typeof b.payout==='number')?Math.round(b.payout-b.stake)
             :(/thua|thất bại/i.test(b.result)?-b.stake
             :(/thắng/i.test(b.result)?Math.round(b.stake*b.lockedOdds-b.stake):0));
        var col=n>0?'var(--win)':(n<0?'var(--lose)':'var(--mut)');
        net=' <b style="color:'+col+'">('+(n>0?'+':(n<0?'':'±'))+n+'đ)</b>';
      }
      return '<div class="cdet'+(b.me?' me':'')+'"><b>'+esc(b.nick)+(b.me?' (bạn)':'')+'</b> · '+esc(b.label)+' · '+b.stake+'đ @ '+b.lockedOdds+(b.result?' → '+esc(b.result):'')+net+'</div>';
    }).join('');
  }
  return html;
}

// ---- Streak + badges ----
function finishedBetMatches(hist){
  return hist.filter(function(m){ return !m.upcoming && m.bets && m.bets.length && m.bets.some(function(b){return b.result;}); })
             .sort(function(a,b){ return new Date(b.kickoff)-new Date(a.kickoff); });
}
function computeStreak(hist){
  var fm=finishedBetMatches(hist), streak=0;
  for(var i=0;i<fm.length;i++){ if(fm[i].net>0) streak++; else break; }
  var b=el('hdr-streak');
  if(b){ if(streak>=2){ b.textContent='🔥 '+streak+' thắng liên tiếp'; b.classList.remove('hidden'); } else { b.classList.add('hidden'); } }
}
function setRankChip(rows){
  var rb=el('hdr-rank'); if(!rb) return;
  var myRank=rows.findIndex(function(r){return r.nickname===ME.nickname;});
  if(myRank>=0){ rb.textContent=(myRank<3?['🥇','🥈','🥉'][myRank]:'🏅')+' Hạng #'+(myRank+1); rb.classList.remove('hidden'); } else rb.classList.add('hidden');
}
function checkNewWins(hist){
  var key='prophet_wins_'+CURPOOL, seen=null;
  try{ seen=JSON.parse(localStorage.getItem(key)||'null'); }catch(e){}
  var wonKeys=finishedBetMatches(hist).filter(function(m){return m.net>0;}).map(function(m){return m.team1+'|'+m.team2+'|'+m.kickoff;});
  if(seen===null){ try{ localStorage.setItem(key, JSON.stringify(wonKeys)); }catch(e){} return; } // baseline, no party
  var fresh=wonKeys.filter(function(k){ return seen.indexOf(k)<0; });
  if(!fresh.length) return; // không có gì mới -> KHÔNG ghi đè baseline (tránh cache cũ làm reset rồi bắn lại)
  // seen chỉ union thêm -> 1 kèo đã ăn mừng không bao giờ bị tính "mới" lại, kể cả khi hist tạm thiếu/stale.
  try{ localStorage.setItem(key, JSON.stringify(seen.concat(fresh))); }catch(e){}
  celebrate(); msg('🎉 Bạn thắng '+fresh.length+' kèo! Chúc mừng nhà tiên tri!', true);
}

var BADGE_BAD_IDS=['bot','coldstreak'];
// 2 badge hiển thị: XẤU trước (ép) -> badge user pin -> theo thứ tự server trả (đã ưu tiên).
function chooseShown(earned,pinned){
  var bad=earned.filter(function(id){return BADGE_BAD_IDS.indexOf(id)>=0;});
  var order=bad.concat((pinned||[]),earned.filter(function(id){return BADGE_BAD_IDS.indexOf(id)<0;}));
  var seen={},out=[]; order.forEach(function(id){ if(!seen[id]&&BADGES[id]){ seen[id]=1; out.push(id); } });
  return out.slice(0,2);
}
function badgeName(id,r){ var b=BADGES[id]; var n=b.name;
  if(id==='onfire'&&r&&r.streakW) n+=' '+r.streakW;
  if(id==='coldstreak'&&r&&r.streakL) n+=' '+r.streakL;
  return n; }
// Chú thích khớp chuỗi thật (streakW/L) thay vì "3" cứng; thiếu số thì fallback desc tĩnh.
function badgeDesc(id,r){ var b=BADGES[id];
  if(id==='onfire'&&r&&r.streakW) return 'Thắng '+r.streakW+' trận liền tay, đang nóng đừng cản!';
  if(id==='coldstreak'&&r&&r.streakL) return 'Thua '+r.streakL+' trận liền, đen vl.';
  return b.desc; }
function badgeChip(id,r){ var b=BADGES[id]; if(!b) return '';
  return '<span class="bchip'+(BADGE_BAD_IDS.indexOf(id)>=0?' bad':'')+'" title="'+esc(badgeDesc(id,r))+'">'+b.icon+' '+esc(badgeName(id,r))+'</span>'; }
function badgeLine(r,idx){
  var earned=r.badges||[]; if(!earned.length) return '';
  var shown=chooseShown(earned,r.pinned), extra=earned.length-shown.length;
  var chips=shown.map(function(id){return badgeChip(id,r);}).join('');
  if(extra>0) chips+='<span class="bchip more">+'+extra+'</span>';
  return '<div class="bline" onclick="event.stopPropagation();openBadges('+idx+')">'+chips+'</div>';
}
function avColor(name){ name=String(name); var h=0; for(var i=0;i<name.length;i++){ h=(h*31+name.charCodeAt(i))%360; } return 'hsl('+h+',52%,52%)'; }
function loadLb(){
  if(!CURPOOL){ el('view-lb').innerHTML='<div class="card center muted" style="padding:26px">Chọn một sảnh trước nhé.</div>'; return; }
  swr('lb', function(){ return srun('getLeaderboard', TOKEN, CURPOOL); }, applyLb, function(){ spinner('lb'); });
}
function applyLb(rows){
    LBROWS=rows;
    setRankChip(rows);
    var leader=rows.length?rows[0].points:0;
    var myIdx=rows.findIndex(function(r){return r.nickname===ME.nickname;});
    var top=rows.slice(0,3);
    var medalGrad=['linear-gradient(135deg,#ffd23f,#ff9f1c)','linear-gradient(135deg,#dfe7ee,#a8b6c4)','linear-gradient(135deg,#e8a878,#c5774a)'];
    var podOrder=[1,0,2]; // 2nd, 1st, 3rd
    var podium=top.length>=3?'<div class="podium">'+podOrder.map(function(idx){
      var r=top[idx]; if(!r) return '<div class="pod"></div>';
      var me=(r.nickname===ME.nickname);
      var crown=idx===0?'<div class="crown">👑</div>':'<div class="crown"></div>';
      return '<div class="pod r'+(idx+1)+(idx===0?' first':'')+'">'+crown+
        '<div class="av" style="background:'+medalGrad[idx]+'">'+esc(initials(r.nickname))+'</div>'+
        '<div class="pn'+(me?' lbme':'')+'">'+esc(r.nickname)+(me?' (bạn)':'')+'</div>'+
        '<div class="pp">'+n2(r.points)+'</div>'+badgeLine(r,idx)+
        '<div class="ped">'+(idx+1)+'</div></div>';
    }).join('')+'</div>':'';
    var meCard='';
    if(myIdx>=0){
      var meR=rows[myIdx], aboveR=myIdx>0?rows[myIdx-1]:null, belowR=rows[myIdx+1]||null;
      var nextUp=aboveR?(aboveR.points-meR.points):0;
      var statsHtml=myIdx===0
        ? '<div class="mestats"><span class="mestat">🏆 Đang dẫn đầu'+(belowR?' · hơn #2 <b>'+n2(meR.points-belowR.points)+'đ</b>':'')+'</span></div>'
        : '<div class="mestats"><span class="mestat">⚡ Cần <b>+'+n2(nextUp)+'đ</b> để vượt '+esc(aboveR.nickname)+' (#'+myIdx+')</span></div>';
      meCard='<div class="card mecard"><div class="merank">#'+(myIdx+1)+'</div><div style="flex:1;min-width:0"><div style="font-weight:800;font-size:15px">Bạn · '+n2(meR.points)+'đ</div>'+statsHtml+'</div></div>';
    }
    var listRows=(top.length>=3?rows.slice(3):rows);
    var list=listRows.map(function(r,i){
      var n=(top.length>=3?i+3:i);
      var me=(r.nickname===ME.nickname);
      return '<div class="lbrow'+(me?' me':'')+'"><div class="rank">'+(n+1)+'</div>'+
        '<div class="lbav" style="background:'+avColor(r.nickname)+'">'+esc(initials(r.nickname))+'</div>'+
        '<div class="lbname'+(me?' lbme':'')+'">'+esc(r.nickname)+(me?' (bạn)':'')+badgeLine(r,n)+'</div>'+
        '<div class="pts">'+n2(r.points)+'đ</div></div>';
    }).join('');
    var listCard=list?'<div class="card" style="padding:6px 14px">'+list+'</div>':'<div class="card center muted" style="padding:22px">🙋<div style="margin-top:6px">Chưa đủ người chơi để xếp hạng thêm.</div></div>';
    el('view-lb').innerHTML='<div class="muted" style="margin:4px 2px 12px;font-weight:700;letter-spacing:.3px">BẢNG XẾP HẠNG</div>'+podium+meCard+listCard;
}

     '<div class="muted" style="line-height:1.55;margin-bottom:11px">Giữ nguyên thành viên, nhưng <b>xóa toàn bộ kèo đã đặt và lịch sử thắng/thua</b>, rồi cấp lại điểm khởi đầu theo số trận hiện tại. Như xóa sảnh tạo lại — nhưng không ai phải tham gia lại. <b>Không thể hoàn tác.</b></div>'+
     '<button id="ap-reset" class="btn ghost block" style="color:var(--lose);border-color:var(--lose-bd)" onclick="resetPool(\''+p.poolId+'\',\''+esc(p.name).replace(/'/g,"\\'")+'\')">↺ Reset sảnh</button>'+
     '<div style="font-weight:800;font-size:14.5px;margin:18px 0 5px">🗑 Xoá sảnh vĩnh viễn</div>'+
     '<div class="muted" style="line-height:1.55;margin-bottom:11px">Xoá hẳn sảnh cùng <b>toàn bộ trận, odds, kèo và thành viên</b>. Dùng khi tạo nhầm hoặc không cần nữa. <b>Không thể hoàn tác.</b></div>'+
     '<button id="ap-del" class="btn ghost block" style="color:var(--lose);border-color:var(--lose-bd)" onclick="deletePool(\''+p.poolId+'\',\''+esc(p.name).replace(/'/g,"\\'")+'\')">🗑 Xoá sảnh</button>'+
   '</div>'+
   /* save bar */
   '<div class="savebar"><button class="btn ghost" style="flex:none;padding-left:16px;padding-right:16px" onclick="loadAdmin()">Huỷ</button><button id="ap-save" class="btn block" onclick="savePool(\''+p.poolId+'\')">💾 Lưu cài đặt</button></div>';
  AP_STATUS=p.status||'draft'; AP_MATCHES=p.matchCount||0;
  loadTournaments(p.tournamentIds);
  loadMembers(p.poolId);
  apPreview();
}
function loadTournaments(selectedCsv, force){
  var sel={}; String(selectedCsv||'').split(',').forEach(function(s){ s=s.trim(); if(s) sel[s]=1; });
  srun('adminTournaments', TOKEN, !!force).then(function(list){
    var box=el('ap-tours'); if(!box) return;
    var refresh='<a href="#" class="muted" style="display:inline-block;margin-top:6px" onclick="loadTournaments(getTids().join(\',\'),true);return false">↻ làm mới danh sách giải</a>';
    if(!list.length){ box.className='tours muted'; box.innerHTML='Không có giải lớn nào đang/sắp diễn ra. '+refresh; updateImportBtn(); return; }
    box.className='tours';
    box.innerHTML=list.map(function(t){
      return '<label class="tour"><input type="checkbox" class="ap-tour" value="'+t.id+'" '+(sel[t.id]?'checked':'')+' onchange="updateImportBtn()"><span>'+esc(t.name)+' <span class="muted">· '+esc(t.category)+' · '+t.fixtures+' trận</span></span></label>';
    }).join('')+refresh;
    updateImportBtn();
  }).catch(function(e){ var box=el('ap-tours'); if(box){ box.className='tours muted'; box.textContent=(e.message||e); } });
}
function getTids(){ return [].slice.call(document.querySelectorAll('.ap-tour:checked')).map(function(c){return c.value;}); }
function updateImportBtn(){ var b=el('ap-import'); if(b) b.classList.toggle('hidden', getTids().length===0); }
function savePool(poolId){
  var reqPwd=el('ap-reqpwd')?el('ap-reqpwd').checked:false;
  var pwd=el('ap-joinPassword')?el('ap-joinPassword').value:'';
  if(reqPwd && !pwd.trim()){ msg('Nhập mật khẩu hoặc tắt yêu cầu mật khẩu'); return; }
  var extraMarkets={};
  EXTRA_MKT_LIB.forEach(function(it){
    var cb=el('ap-ext-'+it.key);
    extraMarkets[it.key]={ enabled: !!(cb && cb.checked) };
  });
  var obj={ name:el('ap-name').value, tournamentIds:getTids().join(','), bookmaker:el('ap-bookmaker').value,
    pointsPerMatch:el('ap-pointsPerMatch').value, startMultiplier:el('ap-startMultiplier').value, noshowPenalty:el('ap-noshowPenalty').value,
    requirePassword:reqPwd, joinPassword:reqPwd?pwd:'', extraMarkets:extraMarkets };
  var b=busy('ap-save','<span class="spin sm"></span> Đang lưu…');
  srun('adminUpdatePool', TOKEN, poolId, obj)
    .then(function(){ return srun('adminSetStatus', TOKEN, poolId, AP_STATUS); })
    .then(function(){ unbusy(b); msg('Đã lưu ✓', true); }).catch(function(e){ unbusy(b); msg(e.message||e); });
}
function doImport(poolId){
  var tids=getTids(); if(!tids.length){ msg('Chọn ít nhất 1 giải'); return; }
  var b=el('ap-import'), orig=b?b.innerHTML:'';
  if(b){ b.disabled=true; b.innerHTML='<span class="spin sm"></span> Đang import…'; }
  srun('adminUpdatePool', TOKEN, poolId, { tournamentIds:tids.join(','), bookmaker:el('ap-bookmaker').value })
    .then(function(){ return srun('adminImport', TOKEN, poolId); })
    .then(function(r){ msg('Import xong ✓', true);
      AP_MATCHES=r.total||0; apPreview(); // cập nhật điểm khởi đầu theo số trận vừa import
      var dt=el('ap-dateTo'); if(dt) dt.textContent=r.dateTo||'—';
      if(b){ b.classList.add('ok'); b.innerHTML='✓ Đã import '+r.added+' trận (tổng '+r.total+')';
        setTimeout(function(){ b.classList.remove('ok'); b.disabled=false; b.innerHTML=orig; }, 2800); } })
    .catch(function(e){ if(b){ b.disabled=false; b.innerHTML=orig; } msg(e.message||e); });
}
function loadMembers(poolId){
  srun('adminListMembers', TOKEN, poolId).then(function(rows){ renderMembers(poolId, rows); }).catch(function(e){
    var box=el('ap-members'); if(box) box.textContent='Không tải được thành viên.';
  });
}
function renderMembers(poolId, rows){
  var box=el('ap-members'); if(!box) return;
  if(!rows.length){ box.innerHTML='<div class="muted">Chưa có thành viên nào.</div>'; return; }
  box.classList.remove('muted');
  box.innerHTML=rows.map(function(m){
    var me=(ME&&m.nickname===ME.nickname);
    var blk=m.blocked?'<span class="blkb">🚫 Đã chặn</span>':'';
    var meb=me?'<span class="meb">bạn</span>':'';
    var btn=me?'' : (m.blocked
      ? '<button class="btn ghost sm" onclick="blockMember(\''+poolId+'\',\''+m.userId+'\',false)">Bỏ chặn</button>'
      : '<button class="btn ghost sm" style="color:var(--lose);border-color:var(--lose-bd)" onclick="blockMember(\''+poolId+'\',\''+m.userId+'\',true,\''+esc(m.nickname).replace(/'/g,"\\'")+'\')">Chặn</button>');
    return '<div class="mbr'+(m.blocked?' blocked':'')+'"><div class="mav" style="background:'+avColor(m.nickname)+'">'+esc(initials(m.nickname))+'</div>'+
      '<div class="mn"><b>'+esc(m.nickname)+'</b>'+meb+blk+'<div class="muted" style="font-size:12px;margin-top:1px">'+n2(m.points)+'đ</div></div>'+btn+'</div>';
  }).join('');
}
function blockMember(poolId, userId, block, name){
  if(block && !confirm('Chặn “'+name+'” khỏi sảnh?\n\nNgười này sẽ không cược được, không vào lại được và bị ẩn khỏi bảng xếp hạng. Điểm và kèo cũ vẫn được giữ. Bạn có thể bỏ chặn sau.')) return;
  srun('adminBlockMember', TOKEN, poolId, userId, block)
    .then(function(){ msg(block?'Đã chặn thành viên ✓':'Đã bỏ chặn ✓', true); loadMembers(poolId); })
    .catch(function(e){ msg(e.message||e); });
}
function resetPool(poolId, name){
  var ans=prompt('Reset sảnh “'+name+'” về đầu mùa?\n\nTất cả kèo đã đặt và điểm thắng/thua sẽ bị xóa, mọi thành viên về điểm khởi đầu. Không thể hoàn tác.\n\nGõ RESET để xác nhận:');
  if(ans==null) return;
  if(ans.trim().toUpperCase()!=='RESET'){ msg('Đã huỷ — chưa gõ đúng RESET'); return; }
  var b=busy('ap-reset','<span class="spin sm"></span> Đang reset…');
  srun('adminResetPool', TOKEN, poolId).then(function(r){ unbusy(b); msg('Đã reset sảnh · '+r.updated+' thành viên về '+r.startingPoints+'đ ('+r.matchCount+' trận) ✓', true); }).catch(function(e){ unbusy(b); msg(e.message||e); });
}
function deletePool(poolId, name){
  var ans=prompt('Xoá vĩnh viễn sảnh “'+name+'”?\n\nToàn bộ trận, odds, kèo và thành viên sẽ bị xoá. Không thể hoàn tác.\n\nGõ DELETE để xác nhận:');
  if(ans==null) return;
  if(ans.trim().toUpperCase()!=='DELETE'){ msg('Đã huỷ — chưa gõ đúng DELETE'); return; }
  var b=busy('ap-del','<span class="spin sm"></span> Đang xoá…');
  srun('adminDeletePool', TOKEN, poolId).then(function(){ msg('Đã xoá sảnh ✓', true); loadAdmin(); }).catch(function(e){ unbusy(b); msg(e.message||e); });
}

// ---- confetti ----
function celebrate(){
  var cv=el('fxcanvas'); if(!cv) return; cv.classList.remove('hidden');
  var ctx=cv.getContext('2d'), W=cv.width=innerWidth, H=cv.height=innerHeight;
  var cols=['#b9ff3d','#22d3ee','#ffd23f','#ff5d6c','#ffffff'], P=[];
  for(var i=0;i<140;i++){ P.push({x:W/2+(Math.random()-.5)*120, y:H*0.28, vx:(Math.random()-.5)*11, vy:Math.random()*-13-4, g:.32+Math.random()*.18,
    s:5+Math.random()*7, c:cols[i%cols.length], r:Math.random()*6, vr:(Math.random()-.5)*.4, a:1}); }
  var t0=Date.now();
  (function frame(){
    var el2=Date.now()-t0; ctx.clearRect(0,0,W,H);
    P.forEach(function(p){ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.a=Math.max(0,1-el2/2200);
      ctx.save(); ctx.globalAlpha=p.a; ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.6); ctx.restore(); });
    if(el2<2200) requestAnimationFrame(frame); else cv.classList.add('hidden');
  })();
}

// ---- utils ----
function fmtKick(k){
  var d=new Date(k); if(isNaN(d)) return String(k);
  var days=['CN','T2','T3','T4','T5','T6','T7'];
  var hh=('0'+d.getHours()).slice(-2), mm=('0'+d.getMinutes()).slice(-2);
  return hh+':'+mm+' '+days[d.getDay()]+' '+d.getDate()+'/'+(d.getMonth()+1);
}
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
// ponytail: round to 2dp; Number->String already drops trailing zeros (15870.40 -> 15870.4)
function n2(x){ return Math.round(Number(x)*100)/100; }
function short(s){ s=String(s); return s.length>10?s.slice(0,9)+'…':s; }

// ---- theme ----
function setTheme(name){
  name=(name==='candy')?'candy':'neon';
  document.documentElement.setAttribute('data-theme', name);
  try{ localStorage.setItem('prophet_theme', name); }catch(e){}
  var n=el('th-neon'), c=el('th-candy');
  if(n) n.className='themebtn'+(name==='neon'?' on':'');
  if(c) c.className='themebtn'+(name==='candy'?' on':'');
}
function cycleTheme(){
  var cur=document.documentElement.getAttribute('data-theme')==='candy'?'candy':'neon';
  var next=cur==='candy'?'neon':'candy';
  setTheme(next);
}
(function(){ var t='neon'; try{ t=localStorage.getItem('prophet_theme')||'neon'; }catch(e){} setTheme(t); })();

authTab('login');
(function(){ var t; try{ t=localStorage.getItem('tok'); }catch(e){}
  if(t) srun('resume', t).then(onAuthed).catch(function(){ try{ localStorage.removeItem('tok'); }catch(e){} });
})();
